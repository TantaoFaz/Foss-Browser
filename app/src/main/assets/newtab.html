<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>Nova aba</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="page">

  <!-- ── TOP BAR ── -->
  <div class="top-bar">
    <div class="logo">void<em>.</em></div>
    <div class="top-pill" onclick="focusSearch()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Buscar ou digitar URL</span>
    </div>
    <div class="top-btn">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="notif-dot"></div>
    </div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: HOME
  ══════════════════════════════ -->
  <div class="screen active" id="screen-home">
    <div class="scroll">

      <div class="hero">
        <div class="greeting" id="greeting">Bom dia</div>
        <div class="hero-title">O que você<br>busca <em>hoje?</em></div>

        <div class="search-wrap">
          <input
            class="search-input"
            id="mainSearch"
            type="search"
            placeholder="Buscar com Brave..."
            autocomplete="off"
            autocorrect="off"
            autocapitalize="none"
            spellcheck="false"
          >
          <button class="search-btn" onclick="doSearch()">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>

        <div class="tags">
          <button class="tag active" onclick="setTag(this, '')">Tudo</button>
          <button class="tag" onclick="setTag(this, '&source=news')">Notícias</button>
          <button class="tag" onclick="setTag(this, '&source=videos')">Vídeos</button>
          <button class="tag" onclick="setTag(this, '&source=images')">Imagens</button>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Atalhos</div>
        <div class="shortcuts" id="shortcuts-grid"></div>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: BUSCAR
  ══════════════════════════════ -->
  <div class="screen" id="screen-search">
    <div class="empty-screen">
      <span>Buscar</span>
    </div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: ABAS
  ══════════════════════════════ -->
  <div class="screen" id="screen-tabs">
    <div class="empty-screen">
      <span>Abas</span>
    </div>
  </div>

  <!-- ══════════════════════════════
       SCREEN: MENU
  ══════════════════════════════ -->
  <div class="screen" id="screen-menu">
    <div class="empty-screen">
      <span>Menu</span>
    </div>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <button class="bnav active" data-screen="screen-home" onclick="showScreen('screen-home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </button>
    <button class="bnav" data-screen="screen-search" onclick="showScreen('screen-search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Buscar
    </button>
    <button class="bnav" data-screen="screen-tabs" onclick="showScreen('screen-tabs')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Abas
      <span class="tab-badge">1</span>
    </button>
    <button class="bnav" data-screen="screen-menu" onclick="showScreen('screen-menu')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      Menu
    </button>
  </nav>

</div>

<script src="js/nav.js"></script>
<script src="js/search.js"></script>
<script src="js/shortcuts.js"></script>
<script>
(function() {
  const h = new Date().getHours();
  let g = 'Boa noite';
  if (h >= 5  && h < 12) g = 'Bom dia';
  else if (h >= 12 && h < 18) g = 'Boa tarde';
  else if (h >= 0  && h < 5)  g = 'Boa madrugada';
  document.getElementById('greeting').textContent = g;
})();
</script>

</body>
</html>
